# vim:fileencoding=utf-8:foldmethod=marker

editor  /opt/homebrew/bin/nvim
allow_remote_control yes
shell_integration enabled

#: Fonts
font_size 18.0
font_family VictorMono Nerd Font Mono

#: Text cursor customization
cursor_shape block
cursor_shape_unfocused hollow
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor_trail 0

#: Scrollback
scrollback_lines 10000
scrollback_pager /opt/homebrew/bin/nvim -R -c "set syntax=man ft=man nonumber norelativenumber" -

#: Mouse
url_style dotted
copy_on_select yes
mouse_hide_wait 3.0

# Performance and quiet terminal behavior
repaint_delay 8
input_delay 1
sync_to_monitor yes
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
confirm_os_window_close 0

## External Files
include ./layout.conf
include ./os-tweaks.conf
include ./keymaps.conf

# BEGIN_KITTY_THEME
background_opacity 0.97
background_blur 20
include ./themes/catppuccin-mocha.conf
# END_KITTY_THEME
